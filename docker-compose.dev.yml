# Overrides for local development — SQLite, hot reload, exposed ports

services:
  backend:
    build:
      context: ./backend
      target: base
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      - sqlite_dev:/app/data
    environment:
      APP_ENV: development
      DATABASE_URL: sqlite+aiosqlite:////app/data/modkit.db
      DEBUG: "true"
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      target: deps
    command: sh -c "npm run dev"
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
    ports:
      - "3000:3000"

  docs:
    build:
      context: ./docs
      dockerfile: Dockerfile
      target: deps
    command: npm start -- --port 3001 --host 0.0.0.0
    working_dir: /app
    volumes:
      - ./docs:/app
      - /app/node_modules
    ports:
      - "3001:3001"

volumes:
  sqlite_dev:
