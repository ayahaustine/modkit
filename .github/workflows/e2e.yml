name: E2E Tests

on:
  push:
    branches: [main, dev]
    paths:
      - "frontend/**"
      - "backend/**"
      - "e2e/**"
      - "docker-compose*.yml"
      - "infra/**"
      - ".github/workflows/e2e.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "frontend/**"
      - "backend/**"
      - "e2e/**"
      - "docker-compose*.yml"
      - "infra/**"
      - ".github/workflows/e2e.yml"

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # build and start the full stack
      - name: Build Docker images
        run: docker compose -f docker-compose.yml -f docker-compose.dev.yml build

      - name: Start services
        run: |
          docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
          echo "Waiting for services to be healthy..."

      - name: Wait for backend to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost/api/v1/health > /dev/null 2>&1; then
              echo "Backend is ready."
              break
            fi
            echo "Attempt $i/30 — waiting..."
            sleep 3
          done
          curl -sf http://localhost/api/v1/health || (echo "Backend did not start in time" && exit 1)

      - name: Wait for frontend to be ready
        run: |
          for i in $(seq 1 20); do
            if curl -sf http://localhost/ > /dev/null 2>&1; then
              echo "Frontend is ready."
              break
            fi
            echo "Attempt $i/20 — waiting..."
            sleep 3
          done

      # set up Node + Playwright
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: e2e/package-lock.json

      - name: Install e2e dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install chromium --with-deps

      # Run tests 
      - name: Run Playwright tests
        working-directory: e2e
        env:
          BASE_URL: http://localhost
          API_URL: http://localhost/api/v1
          TEST_USER_EMAIL: e2e-ci@modkit.test
          TEST_USER_PASSWORD: e2ecipassword1
        run: npm test

      # ── Artefacts 
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14

      - name: Upload test results (JUnit)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: e2e/test-results/
          retention-days: 14

      - name: Dump service logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml -f docker-compose.dev.yml logs --no-color
