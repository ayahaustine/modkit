server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docusaurus baseUrl is /docs/ — nginx at the docs container level
    # receives requests already stripped of the /docs/ prefix by the
    # upstream nginx reverse proxy, so we serve from root here.

    # Locale sub-paths (fr, es, de) and all other routes: try the exact
    # file, then the directory index, then fall back to the locale-aware
    # index.html for client-side routing.
    location / {
        try_files $uri $uri/ $uri/index.html /index.html;
    }

    location /fr/ {
        try_files $uri $uri/ $uri/index.html /fr/index.html;
    }

    location /es/ {
        try_files $uri $uri/ $uri/index.html /es/index.html;
    }

    location /de/ {
        try_files $uri $uri/ $uri/index.html /de/index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
}
